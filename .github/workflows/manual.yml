name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default:'staging'
        type: choice
        options:
          - staging  
          - production
  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Print environment
          run: echo "Deploying to ${{ github.event.inputs.environment }}"